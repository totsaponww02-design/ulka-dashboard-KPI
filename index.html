        // --- Custom Searchable Select Component (ดีไซน์ใหม่) ---
        const SearchableSelect = ({ options, value, onChange, placeholder = "ค้นหา...", containerClass, activeBgClass }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const wrapperRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            useEffect(() => {
                if (isOpen && inputRef.current) {
                    inputRef.current.focus();
                } else {
                    setSearchTerm(""); 
                }
            }, [isOpen]);

            const filteredOptions = options.filter(option => 
                option.label.toLowerCase().includes(searchTerm.toLowerCase()) || 
                (option.subLabel && option.subLabel.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const selectedOption = options.find(opt => opt.id === value);

            return (
                <div ref={wrapperRef} className="relative w-full">
                    <div 
                        className={`w-full border rounded-xl p-2.5 flex justify-between items-center cursor-text transition-all bg-white hover:border-brand-500 focus-within:ring-4 focus-within:ring-brand-50 focus-within:border-brand-500 outline-none ${containerClass}`}
                        onClick={() => setIsOpen(true)}
                    >
                        {isOpen ? (
                            <input 
                                ref={inputRef}
                                type="text"
                                className="w-full bg-transparent outline-none text-slate-800 px-1 font-medium"
                                placeholder="พิมพ์เพื่อค้นหา..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        ) : (
                            <div className="text-slate-800 truncate flex-1 flex items-center gap-1.5 px-1 font-medium">
                                {selectedOption ? (
                                    <>
                                        <span>{selectedOption.label}</span>
                                        {selectedOption.subLabel && <span className="text-slate-400 text-sm font-normal">{selectedOption.subLabel}</span>}
                                    </>
                                ) : (
                                    <span className="text-slate-400 font-normal">{placeholder}</span>
                                )}
                            </div>
                        )}
                        <ChevronDownIcon className={`w-4 h-4 text-slate-400 transition-transform flex-shrink-0 ml-2 ${isOpen ? 'rotate-180' : ''}`} />
                    </div>

                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1.5 bg-white border border-slate-100 rounded-xl shadow-lg max-h-60 overflow-y-auto py-1.5">
                            {filteredOptions.length > 0 ? (
                                filteredOptions.map(option => (
                                    <div 
                                        key={option.id}
                                        className={`px-4 py-2.5 cursor-pointer transition-colors flex items-center gap-1.5 text-sm ${option.id === value ? activeBgClass + ' font-semibold' : 'text-slate-700 hover:bg-slate-50'}`}
                                        onClick={() => {
                                            onChange(option.id);
                                            setIsOpen(false);
                                        }}
                                    >
                                        <span>{option.label}</span> 
                                        {option.subLabel && <span className={`${option.id === value ? 'text-inherit opacity-80' : 'text-slate-400'}`}>{option.subLabel}</span>}
                                    </div>
                                ))
                            ) : (
                                <div className="px-4 py-4 text-slate-400 text-center text-sm">ไม่พบตัวเลือกที่ค้นหา</div>
                            )}

        };

        // --- กำหนดวันเสาร์ที่ทำงาน และ ตำแหน่งหน้าที่ ---
        const STAFF = [
            { id: 'nakrob', name: 'นักรบ', role: 'โมดิฟาย/แพ็ค', kpi: 156, satWork: [2, 4] },

        // ข้อมูลตัวเลือกสำหรับการค้นหา
        const STAFF_OPTIONS = STAFF.map(s => ({ id: s.id, label: s.name, subLabel: `(${s.role})` }));
        const MODEL_OPTIONS = MODELS.map(m => ({ id: m.id, label: m.name, subLabel: `(+${m.points} pt)` }));

        // ฟังก์ชันคำนวณวันทำงานที่เหลือแบบออโต้รายบุคคล
        const calculateAutoDaysLeft = (monthStr, staff) => {
            const today = new Date();
            const currentY = today.getFullYear();
            const currentM = today.getMonth() + 1;
            
            const [targetY, targetM] = monthStr.split('-').map(Number);

            let startDay = 1;
            if (targetY === currentY && targetM === currentM) {
                startDay = today.getDate();
            } else if (targetY < currentY || (targetY === currentY && targetM < currentM)) {
                return 0; 
            }

            const daysInMonth = new Date(targetY, targetM, 0).getDate();
            let count = 0;

            for (let d = startDay; d <= daysInMonth; d++) {
                const dateObj = new Date(targetY, targetM - 1, d);
                const dayOfWeek = dateObj.getDay();

                if (dayOfWeek >= 1 && dayOfWeek <= 5) { 
                    count++;
                } else if (dayOfWeek === 6) { 
                    const weekOfMonth = Math.ceil(d / 7);
                    if (staff.satWork.includes(weekOfMonth)) {
                        count++;
                    }
                }
            }
            return count;
        };

        const getCurrentMonthStr = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        };

        const getInitialDatabase = () => {
            const savedData = localStorage.getItem('modifyTeamData');
            if (savedData) {
                const data = JSON.parse(savedData);
                
                // --- Auto Migration: เชื่อมข้อมูลเก่าเข้ากับชื่อใหม่ ---
                Object.values(data).forEach(month => {
                    if (month.records) {
                        Object.values(month.records).forEach(staffRecord => {
                            if (staffRecord['PROSODA-MAX-VMIX']) {
                                staffRecord['Prosoda-G15Pro'] = (staffRecord['Prosoda-G15Pro'] || 0) + staffRecord['PROSODA-MAX-VMIX'];
                                delete staffRecord['PROSODA-MAX-VMIX'];
                            }
                            if (staffRecord['PROSODA-MIX']) {
                                staffRecord['Prosoda-G830'] = (staffRecord['Prosoda-G830'] || 0) + staffRecord['PROSODA-MIX'];
                                delete staffRecord['PROSODA-MIX'];
                            }
                        });
                    }
                    if (month.logs) {
                        month.logs.forEach(log => {
                            if (log.modelId === 'PROSODA-MAX-VMIX') log.modelId = 'Prosoda-G15Pro';
                            if (log.modelId === 'PROSODA-MIX') log.modelId = 'Prosoda-G830';
                        });
                    }
                });
                return data;
            }
            const initialMonth = '2026-04';
            return {
                [initialMonth]: {
                    records: {
                        nakrob: { '15AF': 5, '20AF': 7, '07S': 3, 'PROSODA': 2, 'RO-G600': 1, 'BLENDER': 3 },
                        amin: { '20AF': 4, '100XJ': 1, '07S': 3, 'M7A': 1, 'U5': 1 },
                        guy: { '20AF': 6, '38F': 4, 'M7A': 2, 'FE301': 4, 'PROSODA-MAX': 1, 'U5': 1, 'RO-G600': 1, 'P3B': 1, '13F_FLOAT': 1 },
                        pman: {}
                    },
                    extraPoints: { nakrob: 0, amin: 0, guy: 0, pman: 0 },
                    customDaysLeft: {},
                    logs: [] 
                }
            };
        };

        function App() {
            const [db, setDb] = useState(getInitialDatabase);
            const [currentMonth, setCurrentMonth] = useState(getCurrentMonthStr()); 
            
            const [activeTab, setActiveTab] = useState('summary');

            const currentMonthData = db[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
            const records = currentMonthData.records || {};
            const extraPoints = currentMonthData.extraPoints || {};
            const customDaysLeft = currentMonthData.customDaysLeft || {};
            const logs = currentMonthData.logs || [];

            // State สำหรับวันที่ในฟอร์ม (ค่าเริ่มต้นคือวันนี้)
            const [recordDate, setRecordDate] = useState(getLocalDateStr());
            const [extraDate, setExtraDate] = useState(getLocalDateStr());

            const [selectedStaff, setSelectedStaff] = useState(STAFF[0].id);
            const [selectedModel, setSelectedModel] = useState(MODELS[0].id);
            const [quantity, setQuantity] = useState(1);

            const [selectedStaffExtra, setSelectedStaffExtra] = useState(STAFF[0].id);
            const [extraPointInput, setExtraPointInput] = useState("");
            const [extraPointNote, setExtraPointNote] = useState("");
            
            const [isDownloading, setIsDownloading] = useState(false);
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                localStorage.setItem('modifyTeamData', JSON.stringify(db));
            }, [db]);

            // สำหรับ Custom Days เปลี่ยนแปลงตาม currentMonth ได้เลย
            const handleCustomDaysChange = (staffId, val) => {
                setDb(prevDb => {
                    const safeData = prevDb[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const newCustom = { ...(safeData.customDaysLeft || {}) };
                    if (val === '') {
                        delete newCustom[staffId]; 
                    } else {
                        newCustom[staffId] = Number(val);
                    }
                    return { ...prevDb, [currentMonth]: { ...safeData, customDaysLeft: newCustom } };
                });
            };

            const handleUpdateRecord = (isAdding) => {
                const amount = isAdding ? Number(quantity) : -Number(quantity);
                if (amount === 0 || isNaN(amount)) return;

                // ดึงเดือนจากวันที่ที่ถูกเลือก
                const safeDate = recordDate || getLocalDateStr();
                const targetMonth = safeDate.substring(0, 7); // YYYY-MM
                
                // สร้าง Timestamp ปลอมที่ตรงกับเวลาปัจจุบันเพื่อใช้ในการเรียงลำดับ
                const now = new Date();
                const [y, m, d] = safeDate.split('-');
                const recordDateTime = new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds());

                setDb(prevDb => {
                    const safeData = prevDb[targetMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const safeRecords = safeData.records || {};
                    const staffRecords = safeRecords[selectedStaff] || {};
                    const currentCount = staffRecords[selectedModel] || 0;
                    const newCount = Math.max(0, currentCount + amount); 
                    
                    const actualAmount = newCount - currentCount;
                    if (actualAmount === 0) return prevDb;

                    const newLog = {
                        id: Date.now() + Math.random().toString(36).substring(2, 5),
                        timestamp: recordDateTime.toISOString(),
                        type: 'model',
                        staffId: selectedStaff,
                        modelId: selectedModel,
                        amount: actualAmount
                    };

                    // นำข้อมูลใหม่ไปต่อและเรียงจากใหม่สุดไปเก่าสุด
                    const updatedLogs = [newLog, ...(safeData.logs || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                    return {
                        ...prevDb,
                        [targetMonth]: {
                            ...safeData,
                            records: {
                                ...safeRecords,
                                [selectedStaff]: {
                                    ...staffRecords,
                                    [selectedModel]: newCount
                                }
                            },
                            logs: updatedLogs
                        }
                    };
                });
                
                // สลับหน้าจอไปยังเดือนที่บันทึกอัตโนมัติหากบันทึกข้ามเดือน
                if (targetMonth !== currentMonth) {
                    setCurrentMonth(targetMonth);
                }
                
                setNotification(isAdding ? 'add' : 'remove');
                setTimeout(() => setNotification(null), 2500);
                setQuantity(1); 
            };

            const handleAddExtraPoints = () => {
                const points = Number(extraPointInput);
                if (isNaN(points) || extraPointInput === "") return;

                const safeDate = extraDate || getLocalDateStr();
                const targetMonth = safeDate.substring(0, 7);
                const now = new Date();
                const [y, m, d] = safeDate.split('-');
                const extraDateTime = new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds());

                setDb(prevDb => {
                    const safeData = prevDb[targetMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const currentExtra = safeData.extraPoints || {};
                    
                    const newLog = {
                        id: Date.now() + Math.random().toString(36).substring(2, 5),
                        timestamp: extraDateTime.toISOString(),
                        type: 'extra',
                        staffId: selectedStaffExtra,
                        points: points,
                        note: extraPointNote.trim()
                    };

                    const updatedLogs = [newLog, ...(safeData.logs || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                    return {
                        ...prevDb,
                        [targetMonth]: {
                            ...safeData,
                            extraPoints: {
                                ...currentExtra,
                                [selectedStaffExtra]: (currentExtra[selectedStaffExtra] || 0) + points
                            },
                            logs: updatedLogs
                        }
                    };
                });

                if (targetMonth !== currentMonth) {
                    setCurrentMonth(targetMonth);

                setTimeout(() => setNotification(null), 2500);
                setExtraPointInput(""); 
                setExtraPointNote("");

                    const element = document.getElementById('printable-area');
                    
                    const opt = {
                        margin:       [0.5, 0.5, 0.5, 0.5], 
                        filename:     `สรุปคะแนนทีมโมดิฟายด์_${currentMonth}.pdf`,
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true },
                        // เปลี่ยนจาก landscape เป็น portrait (แนวตั้ง)
                        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' },
                        // ตั้งค่าให้ตัดหน้ากระดาษตามคลาสที่เราใส่ไว้
                        pagebreak:    { mode: ['css', 'legacy'] }

                        if (model) {
                            totalPoints += count * model.points;
                            totalMachines += count;

                    totalPoints += (extraPoints[person.id] || 0);

                    const autoDays = calculateAutoDaysLeft(currentMonth, person);
                    const activeDays = customDaysLeft[person.id] !== undefined ? customDaysLeft[person.id] : autoDays;
                    const daysToDivide = activeDays > 0 ? activeDays : 1; 

                    return {
                        ...person,
                        totalPoints,
                        totalMachines,
                        autoDays,
                        activeDays,
                        missingPoints: Math.max(0, person.kpi - totalPoints),
                        pointsPerDayNeeded: Math.max(0, (person.kpi - totalPoints) / daysToDivide)

                    groups[dateStr].push(log);

                                        />

                                    <div>

                                        <input 
                                            type="text" 
                                            placeholder="เช่น ช่วยงานแพ็ค, OT, หักมาสาย"
                                            className="w-full border border-slate-200 bg-white rounded-xl p-2.5 font-medium text-slate-800 focus:ring-4 focus:ring-amber-50 focus:border-amber-500 hover:border-amber-300 outline-none shadow-sm transition-all"

                                    // คำนวณจากวันที่เหลือ: ถ้ายอดที่ต้องทำต่อวันสูงกว่าค่าเฉลี่ยปกติ 1.5 เท่า (สมมติเดือนละ 22 วันทำงาน)
                                    const normalDailyAvg = staff.kpi / 22;

                                    let statusBg = "bg-brand-50";
                                    let statusText = "text-brand-600";

                                    }

                                    return (
                                        <div key={staff.id} className={`bg-white rounded-2xl shadow-card p-6 flex flex-col hover:shadow-soft transition-all border ${isGood ? 'border-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.15)]' : 'border-slate-100'}`}>

                                                                        <CheckCircleIcon className="w-3 h-3" /> ทะลุเป้า
                                                                    </span>
                                                                ) : isWarning ? (
                                                                    <span className="text-[10px] px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 border border-orange-200 font-bold flex items-center gap-1 whitespace-nowrap">
                                                                        <ActivityIcon className="w-3 h-3" /> สู้ๆ นะ

                                                    </div>
                                                    <span className="text-[12px] font-semibold text-slate-500">วัน</span>
                                                </div>
                                            </div>

                                        </div>
                                    );
                                })}
                            </div>

                            {/* --- ตัวตัดหน้ากระดาษ (Page Break) สำหรับ PDF --- */}
                            <div className="html2pdf__page-break"></div>

                            {/* Data Table / History Tab Control (หน้า 2) */}
                            <div className="bg-white rounded-2xl shadow-card overflow-hidden flex flex-col print-force-summary border border-slate-100 print:shadow-none print:border-none print:bg-transparent print:mt-4">
                                
                                {/* แถบเลือกโหมด (ซ่อนตอนปรินต์) */}
                                <div className="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100 bg-white flex items-center justify-between gap-4 overflow-x-auto hide-scrollbar print:hidden">
                                    <h2 className="font-bold text-[15px] sm:text-[16px] text-slate-800 flex items-center gap-2 whitespace-nowrap flex-shrink-0">
                                        {activeTab === 'summary' ? <ListIcon className="w-4 h-4 text-slate-400" /> : activeTab === 'history' ? <ActivityIcon className="w-4 h-4 text-slate-400" /> : <CalendarIcon className="w-4 h-4 text-slate-400" />}
                                        {activeTab === 'summary' ? 'ตารางสรุปผลงาน' : activeTab === 'history' ? 'ประวัติการบันทึก' : 'ประวัติรายเดือน'}
                                    </h2>
                                    <div className="flex bg-slate-50 p-1 rounded-lg border border-slate-100 gap-1 flex-shrink-0">
                                        <button 
                                            onClick={() => setActiveTab('summary')}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[13px] font-semibold transition-all whitespace-nowrap ${activeTab === 'summary' ? 'bg-white text-brand-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            <ListIcon className="w-3.5 h-3.5" /> สรุปยอด
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('history')}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[13px] font-semibold transition-all whitespace-nowrap ${activeTab === 'history' ? 'bg-white text-brand-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            <ActivityIcon className="w-3.5 h-3.5" /> ประวัติรายวัน
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('monthly')}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[13px] font-semibold transition-all whitespace-nowrap ${activeTab === 'monthly' ? 'bg-white text-brand-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            <CalendarIcon className="w-3.5 h-3.5" /> ประวัติรายเดือน
                                        </button>
                                    </div>
                                </div>

                                {/* โซนแสดงเนื้อหา */}
                                <div className="p-0">
                                    {/* 1. โหมดตารางสรุปผล (แสดงเสมอตอนปรินต์) */}
                                    <div className={`overflow-x-auto ${activeTab === 'summary' ? 'block' : 'hidden print:block'}`}>
                                        <table className="w-full text-[13px] print:text-[11px] text-left whitespace-nowrap">
                                            <thead className="text-[14px] print:text-[12px] text-slate-800 font-bold bg-slate-100/80 border-b-2 border-slate-200 print:bg-slate-200/50">
                                                <tr>
                                                    <th className="px-6 py-4 print:py-2 print:px-4 rounded-tl-lg">รุ่นเครื่อง</th>
                                                    <th className="px-6 py-4 print:py-2 print:px-4 text-center">คะแนน/เครื่อง</th>
                                                    {STAFF.map(s => (
                                                        <th key={s.id} className="px-6 py-4 print:py-2 print:px-4 text-center">{s.name}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50 print:divide-slate-100">
                                                {MODELS.filter(m => 
                                                    STAFF.some(s => (records[s.id]?.[m.id] || 0) > 0)
                                                ).map((model) => (
                                                    <tr key={model.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-6 py-3.5 print:py-1.5 print:px-4 font-semibold text-slate-700">
                                                            {model.name}
                                                        </td>
                                                        <td className="px-6 py-3.5 print:py-1.5 print:px-4 text-center font-medium text-slate-400 print:text-slate-500">
                                                            {model.points}
                                                        </td>
                                                        {STAFF.map(staff => {
                                                            const count = records[staff.id]?.[model.id] || 0;
                                                            return (
                                                                <td key={staff.id} className="px-6 py-3.5 print:py-1.5 print:px-4 text-center">
                                                                    {count > 0 ? (
                                                                        <span className="inline-flex items-center justify-center min-w-[28px] h-7 print:h-5 print:min-w-[20px] px-2 print:px-1 rounded bg-slate-100 print:bg-transparent text-slate-700 font-bold text-[12px] print:text-[11px]">
                                                                            {count}
                                                                        </span>
                                                                    ) : (
                                                                        <span className="text-slate-200 font-medium print:text-slate-300">-</span>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                                
                                                {/* แถวสรุปจำนวนเครื่องทั้งหมด */}
                                                <tr className="bg-slate-50/80 print:bg-slate-100/50 border-t border-slate-200">
                                                    <td colSpan="2" className="px-6 py-4 print:py-2.5 print:px-4 font-bold text-slate-500 print:text-slate-600 text-[12px] uppercase tracking-wider">
                                                        ยอดรวมเครื่องที่ทำได้
                                                    </td>
                                                    {staffScores.map(staff => (
                                                        <td key={staff.id} className="px-6 py-4 print:py-2.5 print:px-4 text-center font-bold text-slate-700 text-sm print:text-[12px]">
                                                            {staff.totalMachines}
                                                        </td>
                                                    ))}
                                                </tr>

                                                {/* แถวคะแนนเสริม */}
                                                <tr className="bg-amber-50/30 print:bg-amber-50 hover:bg-amber-50/50 transition-colors border-t border-slate-100">
                                                    <td colSpan="2" className="px-6 py-4 print:py-2.5 print:px-4 font-bold text-amber-700 text-[12px] uppercase tracking-wider">
                                                        คะแนนงานเสริม
                                                    </td>
                                                    {STAFF.map(staff => (
                                                        <td key={staff.id} className="px-6 py-4 print:py-2.5 print:px-4 text-center font-bold text-amber-600 print:text-amber-700">
                                                            {extraPoints[staff.id] !== 0 ? (extraPoints[staff.id] > 0 ? `+${extraPoints[staff.id]}` : extraPoints[staff.id]) : "-"}
                                                        </td>
                                                    ))}
                                                </tr>

                                                {/* แถวสรุปรวมทั้งหมด */}
                                                <tr className="bg-slate-800 print:bg-slate-700 text-white border-t-2 border-slate-900 print:border-slate-800">
                                                    <td colSpan="2" className="px-6 py-5 print:py-3 print:px-4 font-bold text-[14px] print:text-[13px] uppercase tracking-wider rounded-bl-lg print:rounded-none">
                                                        คะแนนรวมทั้งหมด
                                                    </td>
                                                    {staffScores.map(staff => (
                                                        <td key={staff.id} className="px-6 py-5 print:py-3 print:px-4 text-center font-bold text-[16px] print:text-[14px]">
                                                            {staff.totalPoints.toFixed(2)}
                                                        </td>
                                                    ))}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* 2. โหมดประวัติรายวัน (ซ่อนตอนปรินต์) */}
                                    <div className={`${activeTab === 'history' ? 'block' : 'hidden'} print:hidden p-6 max-h-[600px] overflow-y-auto`}>
                                        {Object.keys(groupedLogs).length === 0 ? (
                                            <div className="text-center text-slate-400 py-16 flex flex-col items-center">
                                                <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 border border-slate-100">
                                                    <ActivityIcon className="w-8 h-8 text-slate-300" />
                                                </div>
                                                <p className="font-medium text-slate-500">ยังไม่มีประวัติการบันทึกในเดือนนี้</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-8">
                                                {Object.entries(groupedLogs).map(([dateStr, logsForDate]) => (
                                                    <div key={dateStr} className="relative">
                                                        <h3 className="text-[12px] font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                            <span className="w-2 h-2 rounded-full bg-brand-400"></span>
                                                            {dateStr}
                                                        </h3>
                                                        <div className="space-y-2.5 pl-[3px]">
                                                            {logsForDate.map(log => {
                                                                const timeStr = new Date(log.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                                                                const staff = STAFF.find(s => s.id === log.staffId)?.name || 'ไม่ทราบชื่อ';
                                                                
                                                                if (log.type === 'model') {
                                                                    const model = MODELS.find(m => m.id === log.modelId);
                                                                    const modelName = model ? model.name : log.modelId;
                                                                    const isAdd = log.amount > 0;
                                                                    const pointEarned = model ? (log.amount * model.points) : 0;

                                                                    return (
                                                                        <div key={log.id} className="bg-white p-3.5 rounded-xl border border-slate-100 shadow-sm text-[13px] flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 hover:border-brand-100 transition-colors">
                                                                            <div className="flex items-center gap-3.5">
                                                                                <span className="text-[11px] text-slate-400 font-bold w-10 shrink-0">{timeStr}</span>
                                                                                <span className={`flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-md ${isAdd ? 'bg-brand-50 text-brand-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                                    {isAdd ? <PlusCircleIcon className="w-3.5 h-3.5"/> : <MinusCircleIcon className="w-3.5 h-3.5"/>}
                                                                                </span>
                                                                                <div className="flex flex-wrap items-center gap-1.5">
                                                                                    <span className="font-bold text-slate-700">{staff}</span>
                                                                                    <span className="text-slate-500">{isAdd ? 'บันทึก' : 'ลบ'}&nbsp;<strong className="text-slate-800">{modelName}</strong></span>
                                                                                </div>
                                                                            </div>
                                                                            <div className="font-bold text-slate-700 flex items-center gap-2 pl-12 sm:pl-0">
                                                                                {isAdd ? '+' : ''}{log.amount} <span className="text-[11px] text-slate-400 font-medium">เครื่อง</span>
                                                                                <span className={`text-[11px] px-2 py-0.5 rounded-md border ${isAdd ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                                                                                    {isAdd ? '+' : ''}{pointEarned.toFixed(2)} pt
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                } else if (log.type === 'extra') {
                                                                    const isAdd = log.points > 0;
                                                                    return (
                                                                        <div key={log.id} className="bg-amber-50/30 p-3.5 rounded-xl border border-amber-100/50 shadow-sm text-[13px] flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 hover:border-amber-200 transition-colors">
                                                                            <div className="flex items-center gap-3.5">
                                                                                <span className="text-[11px] text-slate-400 font-bold w-10 shrink-0">{timeStr}</span>
                                                                                <span className={`flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-md ${isAdd ? 'bg-amber-100 text-amber-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                                    <StarIcon className="w-3.5 h-3.5"/>
                                                                                </span>
                                                                                <div className="flex flex-wrap items-center gap-1.5">
                                                                                    <span className="font-bold text-slate-700">{staff}</span>
                                                                                    <span className="text-amber-700 font-medium">บันทึกคะแนนเสริม</span>
                                                                                    {log.note && <span className="text-[11px] bg-white text-slate-500 px-2 py-0.5 rounded border border-slate-200 ml-1">"{log.note}"</span>}
                                                                                </div>
                                                                            </div>
                                                                            <div className="font-bold text-amber-600 pl-12 sm:pl-0">
                                                                                {isAdd ? '+' : ''}{log.points} <span className="text-[11px] text-amber-400 font-medium">pt</span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* 3. โหมดสรุปรายเดือนย้อนหลัง (ซ่อนตอนปรินต์) */}
                                    <div className={`${activeTab === 'monthly' ? 'block' : 'hidden'} print:hidden p-0 overflow-x-auto`}>
                                        <table className="w-full text-[13px] text-left whitespace-nowrap">
                                            <thead className="text-[14px] text-slate-800 font-bold bg-slate-100/80 border-b-2 border-slate-200">
                                                <tr>
                                                    <th className="px-6 py-4 rounded-tl-lg">ประจำเดือน</th>
                                                    {STAFF.map(s => (
                                                        <th key={s.id} className="px-6 py-4 text-center">{s.name} <span className="text-[11px] font-medium text-slate-500 block mt-0.5">({s.kpi} pt)</span></th>
                                                    ))}
                                                    <th className="px-6 py-4 text-center rounded-tr-lg">จัดการ</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {Object.keys(db).sort().reverse().map(monthKey => {
                                                    const mData = db[monthKey];
                                                    const [y, m] = monthKey.split('-');
                                                    const monthName = new Date(y, m - 1).toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

                                                    return (
                                                        <tr key={monthKey} className="hover:bg-slate-50/50 transition-colors group">
                                                            <td className="px-6 py-4 font-bold text-slate-700">
                                                                <div className="flex items-center gap-2">
                                                                    <CalendarIcon className="w-4 h-4 text-slate-400 group-hover:text-brand-500 transition-colors" />
                                                                    {monthName}
                                                                </div>
                                                            </td>
                                                            {STAFF.map(staff => {
                                                                let totalPoints = 0;
                                                                let totalMachines = 0;
                                                                const pRecs = mData.records?.[staff.id] || {};
                                                                Object.entries(pRecs).forEach(([modelId, count]) => {
                                                                    const model = MODELS.find(m => m.id === modelId);
                                                                    if (model) {
                                                                        totalPoints += count * model.points;
                                                                        totalMachines += count;
                                                                    }
                                                                });
                                                                totalPoints += (mData.extraPoints?.[staff.id] || 0);
                                                                
                                                                const isGood = totalPoints >= staff.kpi;

                                                                return (
                                                                    <td key={staff.id} className={`px-6 py-4 text-center ${totalPoints > 0 ? (isGood ? 'text-emerald-600' : 'text-slate-600') : 'text-slate-300'}`}>
                                                                        {totalPoints > 0 ? (
                                                                            <div className="flex flex-col items-center gap-1">
                                                                                <span className={`inline-flex items-center justify-center px-2.5 py-1 rounded-md font-bold ${isGood ? 'bg-emerald-50' : 'bg-slate-50'}`}>
                                                                                    {totalPoints.toFixed(2)}
                                                                                </span>
                                                                                <span className="text-[11px] font-medium text-slate-400">
                                                                                    {totalMachines} เครื่อง
                                                                                </span>
                                                                            </div>
                                                                        ) : '-'}
                                                                    </td>
                                                                );
                                                            })}
                                                            <td className="px-6 py-4 text-center">
                                                                <button 
                                                                    onClick={() => { setCurrentMonth(monthKey); setActiveTab('summary'); }}
                                                                    className="px-3 py-1.5 bg-brand-50 text-brand-600 hover:bg-brand-100 rounded-lg text-[12px] font-semibold transition-colors active:scale-[0.98]"
                                                                >
                                                                    ดูรายละเอียด
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                        {Object.keys(db).length === 0 && (
                                            <div className="text-center text-slate-400 py-16">ยังไม่มีข้อมูลในระบบ</div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </div>
                        {/* จบพื้นที่สำหรับ PDF */}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        @media print {
            .hidden.print\:block { display: block !important; }
        }
    </style>
</body>
</html>
