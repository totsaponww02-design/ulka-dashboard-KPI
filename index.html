        // --- Custom Searchable Select Component (ดีไซน์ใหม่) ---
        const SearchableSelect = ({ options, value, onChange, placeholder = "ค้นหา...", containerClass, activeBgClass }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const wrapperRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            useEffect(() => {
                if (isOpen && inputRef.current) {
                    inputRef.current.focus();
                } else {
                    setSearchTerm(""); 
                }
            }, [isOpen]);

            const filteredOptions = options.filter(option => 
                option.label.toLowerCase().includes(searchTerm.toLowerCase()) || 
                (option.subLabel && option.subLabel.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const selectedOption = options.find(opt => opt.id === value);

            return (
                <div ref={wrapperRef} className="relative w-full">
                    <div 
                        className={`w-full border rounded-xl p-2.5 flex justify-between items-center cursor-text transition-all bg-white hover:border-brand-500 focus-within:ring-4 focus-within:ring-brand-50 focus-within:border-brand-500 outline-none ${containerClass}`}
                        onClick={() => setIsOpen(true)}
                    >
                        {isOpen ? (
                            <input 
                                ref={inputRef}
                                type="text"
                                className="w-full bg-transparent outline-none text-slate-800 px-1 font-medium"
                                placeholder="พิมพ์เพื่อค้นหา..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        ) : (
                            <div className="text-slate-800 truncate flex-1 flex items-center gap-1.5 px-1 font-medium">
                                {selectedOption ? (
                                    <>
                                        <span>{selectedOption.label}</span>
                                        {selectedOption.subLabel && <span className="text-slate-400 text-sm font-normal">{selectedOption.subLabel}</span>}
                                    </>
                                ) : (
                                    <span className="text-slate-400 font-normal">{placeholder}</span>
                                )}
                            </div>
                        )}
                        <ChevronDownIcon className={`w-4 h-4 text-slate-400 transition-transform flex-shrink-0 ml-2 ${isOpen ? 'rotate-180' : ''}`} />
                    </div>

                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1.5 bg-white border border-slate-100 rounded-xl shadow-lg max-h-60 overflow-y-auto py-1.5">
                            {filteredOptions.length > 0 ? (

                                        className={`px-4 py-2.5 cursor-pointer transition-colors flex items-center gap-1.5 text-sm ${option.id === value ? activeBgClass + ' font-semibold' : 'text-slate-700 hover:bg-slate-50'}`}
                                        onClick={() => {
                                            onChange(option.id);
                                            setIsOpen(false);
                                        }}
                                    >

                                        {option.subLabel && <span className={`${option.id === value ? 'text-inherit opacity-80' : 'text-slate-400'}`}>{option.subLabel}</span>}
                                    </div>
                                ))

        // ฟังก์ชันคำนวณวันทำงานที่เหลือแบบออโต้รายบุคคล
        const calculateAutoDaysLeft = (monthStr, staff) => {
            const staffEndMonth = staff.endDate ? staff.endDate.substring(0, 7) : null;

            // ถ้าระบบกำลังดูเดือนที่เขาลาออกไปแล้ว ให้วันเหลือ = 0
            if (staffEndMonth && monthStr > staffEndMonth) return 0;

            const today = new Date();
            const currentY = today.getFullYear();
            const currentM = today.getMonth() + 1;
            
            const [targetY, targetM] = monthStr.split('-').map(Number);

            let startDay = 1;
            if (targetY === currentY && targetM === currentM) {
                startDay = today.getDate();
            } else if (targetY < currentY || (targetY === currentY && targetM < currentM)) {
                return 0; 
            }

            let endDay = new Date(targetY, targetM, 0).getDate();

            // ถ้าเป็นเดือนที่ลาออกพอดี และระบุวันที่ไว้ ให้สิ้นสุดการนับแค่วันที่ลาออก
            if (staff.endDate && monthStr === staffEndMonth) {
                const quitDay = parseInt(staff.endDate.split('-')[2], 10);
                if (!isNaN(quitDay) && quitDay < endDay) {
                    endDay = quitDay;
                }
            }

            // ป้องกันกรณีเลยวันที่ลาออกไปแล้วในเดือนปัจจุบัน
            if (startDay > endDay) return 0;

            let count = 0;

            for (let d = startDay; d <= endDay; d++) {
                const dateObj = new Date(targetY, targetM - 1, d);
                const dayOfWeek = dateObj.getDay();

                if (dayOfWeek >= 1 && dayOfWeek <= 5) { 
                    count++;
                } else if (dayOfWeek === 6) { 
                    const weekOfMonth = Math.ceil(d / 7);
                    if (staff.satWork.includes(weekOfMonth)) {
                        count++;
                    }
                }
            }
            return count;
        };

        const getCurrentMonthStr = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        };

                Object.values(data).forEach(month => {

                        Object.values(month.records).forEach(staffRecord => {

                    if (month.logs) {

                        nakrob: { '15AF': 5, '20AF': 7, '07S': 3, 'PROSODA': 2, 'RO-G600': 1, 'BLENDER': 3 },
                        amin: { '20AF': 4, '100XJ': 1, '07S': 3, 'M7A': 1, 'U5': 1 },
                        guy: { '20AF': 6, '38F': 4, 'M7A': 2, 'FE301': 4, 'PROSODA-MAX': 1, 'U5': 1, 'RO-G600': 1, 'P3B': 1, '13F_FLOAT': 1 },
                        pman: {}
                    },
                    extraPoints: { nakrob: 0, amin: 0, guy: 0, pman: 0 },
                    customDaysLeft: {},
                    logs: [] 
                }
            };
        };

        function App() {
            const [db, setDb] = useState(getInitialDatabase);
            const [staffList, setStaffList] = useState(() => {
                const savedStaff = localStorage.getItem('modifyTeamStaff');
                return savedStaff ? JSON.parse(savedStaff) : DEFAULT_STAFF;
            });
            const [modelList, setModelList] = useState(() => {
                const savedModels = localStorage.getItem('modifyTeamModels');
                return savedModels ? JSON.parse(savedModels) : DEFAULT_MODELS;
            });
            const [currentMonth, setCurrentMonth] = useState(getCurrentMonthStr()); 
            
            const [activeTab, setActiveTab] = useState('summary');

            // --- Staff Modal States ---
            const [isStaffModalOpen, setIsStaffModalOpen] = useState(false);
            const [staffForm, setStaffForm] = useState({ id: '', name: '', role: 'โมดิฟาย', kpi: 312, satWork: [], endDate: '' });
            const [staffError, setStaffError] = useState('');

            // --- Model Modal States ---
            const [isModelModalOpen, setIsModelModalOpen] = useState(false);
            const [modelForm, setModelForm] = useState({ id: '', name: '', points: 1 });
            const [modelError, setModelError] = useState('');
            const [isEditingModel, setIsEditingModel] = useState(false);

            const currentMonthData = db[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
            const records = currentMonthData.records || {};
            const extraPoints = currentMonthData.extraPoints || {};
            const customDaysLeft = currentMonthData.customDaysLeft || {};
            const logs = currentMonthData.logs || [];

            // คำนวณหา "พนักงานที่ต้องแสดงผลในเดือนที่กำลังดูอยู่"
            const visibleStaff = useMemo(() => {
                return staffList.filter(staff => {
                    const staffEndMonth = staff.endDate ? staff.endDate.substring(0, 7) : null;
                    
                    // กรณี 1: พนักงานยังไม่ลาออก หรือ เดือนที่กำลังดูอยู่น้อยกว่า/เท่ากับ เดือนที่เขาลาออก
                    const isActiveInCurrentMonth = !staffEndMonth || currentMonth <= staffEndMonth;
                    
                    // กรณี 2: เผื่อมีข้อมูลคะแนนหลงอยู่ในเดือนที่เขาลาออกไปแล้ว (เช่น คีย์ย้อนหลัง) ก็ต้องแสดงชื่อเขาด้วยเพื่อไม่ให้ข้อมูลหาย
                    const hasRecords = records[staff.id] && Object.keys(records[staff.id]).length > 0;
                    const hasExtra = extraPoints[staff.id] && extraPoints[staff.id] !== 0;
                    
                    return isActiveInCurrentMonth || hasRecords || hasExtra;
                });
            }, [currentMonth, records, extraPoints, staffList]);

            // สร้างตัวเลือกเฉพาะพนักงานที่แสดงผลได้
            const staffOptions = useMemo(() => {
                return visibleStaff.map(s => {
                    const staffEndMonth = s.endDate ? s.endDate.substring(0, 7) : null;
                    const isResigned = staffEndMonth && currentMonth > staffEndMonth;
                    return { 
                        id: s.id, 
                        label: s.name, 
                        subLabel: `(${s.role}${isResigned ? ' - ลาออกแล้ว' : ''})` 
                    };
                });
            }, [visibleStaff, currentMonth]);

            const MODEL_OPTIONS = useMemo(() => {
                return modelList.map(m => ({ id: m.id, label: m.name, subLabel: `(+${m.points} pt)` }));
            }, [modelList]);

            // State สำหรับวันที่ในฟอร์ม (ค่าเริ่มต้นคือวันนี้)
            const [recordDate, setRecordDate] = useState(getLocalDateStr());
            const [extraDate, setExtraDate] = useState(getLocalDateStr());

            const [selectedStaff, setSelectedStaff] = useState(staffList[0]?.id || '');
            const [selectedModel, setSelectedModel] = useState(modelList[0]?.id || '');
            const [quantity, setQuantity] = useState(1);

            const [selectedStaffExtra, setSelectedStaffExtra] = useState(staffList[0]?.id || '');
            const [extraPointInput, setExtraPointInput] = useState("");
            const [extraPointNote, setExtraPointNote] = useState("");
            
            const [notification, setNotification] = useState(null);

            // เซ็ตค่าชื่อพนักงานเริ่มต้นใหม่ หากเปลี่ยนเดือนแล้วพนักงานที่เลือกไว้ก่อนหน้าถูกซ่อน
            useEffect(() => {
                if (visibleStaff.length > 0) {
                    if (!visibleStaff.find(s => s.id === selectedStaff)) {
                        setSelectedStaff(visibleStaff[0].id);
                    }
                    if (!visibleStaff.find(s => s.id === selectedStaffExtra)) {
                        setSelectedStaffExtra(visibleStaff[0].id);
                    }
                }
            }, [visibleStaff, selectedStaff, selectedStaffExtra]);

            useEffect(() => {
                if (modelList.length > 0 && !modelList.find(m => m.id === selectedModel)) {
                    setSelectedModel(modelList[0].id);
                }
            }, [modelList, selectedModel]);

            useEffect(() => {
                localStorage.setItem('modifyTeamData', JSON.stringify(db));
            }, [db]);

            useEffect(() => {
                localStorage.setItem('modifyTeamStaff', JSON.stringify(staffList));
            }, [staffList]);

            useEffect(() => {
                localStorage.setItem('modifyTeamModels', JSON.stringify(modelList));
            }, [modelList]);

            // --- ฟังก์ชันจัดการพนักงาน ---
            const handleSaveStaff = () => {
                if (!staffForm.name.trim() || !staffForm.role.trim() || staffForm.kpi <= 0) {
                    setStaffError("กรุณากรอกข้อมูลชื่อ ตำแหน่ง และ KPI ให้ครบถ้วน");
                    return;
                }
                setStaffError('');
                
                setStaffList(prev => {
                    const formattedForm = {
                        ...staffForm,
                        endDate: staffForm.endDate || undefined
                    };

                    if (staffForm.id) {
                        return prev.map(s => s.id === staffForm.id ? formattedForm : s);
                    } else {
                        const newId = 'staff_' + Date.now();
                        return [...prev, { ...formattedForm, id: newId }];
                    }
                });
                
                setStaffForm({ id: '', name: '', role: 'โมดิฟาย', kpi: 312, satWork: [], endDate: '' });
            };

            const handleEditStaff = (staff) => {
                setStaffForm({ ...staff, endDate: staff.endDate || '' });
                setStaffError('');
            };

            const handleCancelEdit = () => {
                setStaffForm({ id: '', name: '', role: 'โมดิฟาย', kpi: 312, satWork: [], endDate: '' });
                setStaffError('');
            };

            const toggleSatWork = (weekNum) => {
                setStaffForm(prev => {
                    const current = prev.satWork || [];
                    if (current.includes(weekNum)) {
                        return { ...prev, satWork: current.filter(w => w !== weekNum) };
                    } else {
                        return { ...prev, satWork: [...current, weekNum].sort() };
                    }
                });
            };

            // --- ฟังก์ชันจัดการรุ่นเครื่อง ---
            const handleSaveModel = () => {
                if (!modelForm.id.trim() || !modelForm.name.trim() || modelForm.points <= 0) {
                    setModelError("กรุณากรอกรหัสเครื่อง ชื่อรุ่น และคะแนนให้ครบถ้วนและถูกต้อง");
                    return;
                }
                
                if (!isEditingModel && modelList.some(m => m.id === modelForm.id.trim())) {
                    setModelError("รหัสเครื่อง (ID) นี้มีอยู่ในระบบแล้ว กรุณาใช้รหัสอื่น");
                    return;
                }

                setModelError('');
                
                setModelList(prev => {
                    if (isEditingModel) {
                        return prev.map(m => m.id === modelForm.id ? { ...m, name: modelForm.name.trim(), points: Number(modelForm.points) } : m);
                    } else {
                        return [...prev, { id: modelForm.id.trim(), name: modelForm.name.trim(), points: Number(modelForm.points) }];
                    }
                });
                
                setModelForm({ id: '', name: '', points: 1 });
                setIsEditingModel(false);
            };

            const handleEditModel = (model) => {
                setModelForm({ id: model.id, name: model.name, points: model.points });
                setIsEditingModel(true);
                setModelError('');
            };

            const handleCancelEditModel = () => {
                setModelForm({ id: '', name: '', points: 1 });
                setIsEditingModel(false);
                setModelError('');
            };

            // สำหรับ Custom Days เปลี่ยนแปลงตาม currentMonth ได้เลย
            const handleCustomDaysChange = (staffId, val) => {
                setDb(prevDb => {
                    const safeData = prevDb[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const newCustom = { ...(safeData.customDaysLeft || {}) };
                    if (val === '') {
                        delete newCustom[staffId]; 
                    } else {
                        newCustom[staffId] = Number(val);
                    }
                    return { ...prevDb, [currentMonth]: { ...safeData, customDaysLeft: newCustom } };
                });
            };

            const handleUpdateRecord = (isAdding) => {
                const amount = isAdding ? Number(quantity) : -Number(quantity);
                if (amount === 0 || isNaN(amount)) return;

                // ดึงเดือนจากวันที่ที่ถูกเลือก
                const safeDate = recordDate || getLocalDateStr();
                const targetMonth = safeDate.substring(0, 7); // YYYY-MM
                
                // สร้าง Timestamp ปลอมที่ตรงกับเวลาปัจจุบันเพื่อใช้ในการเรียงลำดับ
                const now = new Date();
                const [y, m, d] = safeDate.split('-');
                const recordDateTime = new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds());

                setDb(prevDb => {
                    const safeData = prevDb[targetMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const safeRecords = safeData.records || {};
                    const staffRecords = safeRecords[selectedStaff] || {};
                    const currentCount = staffRecords[selectedModel] || 0;
                    const newCount = Math.max(0, currentCount + amount); 
                    
                    const actualAmount = newCount - currentCount;
                    if (actualAmount === 0) return prevDb;

                    const newLog = {
                        id: Date.now() + Math.random().toString(36).substring(2, 5),
                        timestamp: recordDateTime.toISOString(),
                        type: 'model',
                        staffId: selectedStaff,
                        modelId: selectedModel,
                        amount: actualAmount
                    };

                    // นำข้อมูลใหม่ไปต่อและเรียงจากใหม่สุดไปเก่าสุด
                    const updatedLogs = [newLog, ...(safeData.logs || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                    return {
                        ...prevDb,
                        [targetMonth]: {
                            ...safeData,
                            records: {
                                ...safeRecords,
                                [selectedStaff]: {
                                    ...staffRecords,
                                    [selectedModel]: newCount
                                }
                            },
                            logs: updatedLogs
                        }
                    };
                });
                
                // สลับหน้าจอไปยังเดือนที่บันทึกอัตโนมัติหากบันทึกข้ามเดือน
                if (targetMonth !== currentMonth) {
                    setCurrentMonth(targetMonth);
                }
                
                setNotification(isAdding ? 'add' : 'remove');
                setTimeout(() => setNotification(null), 2500);
                setQuantity(1); 
            };

            const handleAddExtraPoints = () => {
                const points = Number(extraPointInput);
                if (isNaN(points) || extraPointInput === "") return;

                const safeDate = extraDate || getLocalDateStr();
                const targetMonth = safeDate.substring(0, 7);
                const now = new Date();
                const [y, m, d] = safeDate.split('-');
                const extraDateTime = new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds());

                setDb(prevDb => {
                    const safeData = prevDb[targetMonth] || { records: {}, extraPoints: {}, customDaysLeft: {}, logs: [] };
                    const currentExtra = safeData.extraPoints || {};
                    
                    const newLog = {
                        id: Date.now() + Math.random().toString(36).substring(2, 5),
                        timestamp: extraDateTime.toISOString(),
                        type: 'extra',
                        staffId: selectedStaffExtra,
                        points: points,
                        note: extraPointNote.trim()
                    };

                    const updatedLogs = [newLog, ...(safeData.logs || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                    return {
                        ...prevDb,
                        [targetMonth]: {
                            ...safeData,
                            extraPoints: {
                                ...currentExtra,
                                [selectedStaffExtra]: (currentExtra[selectedStaffExtra] || 0) + points
                            },
                            logs: updatedLogs
                        }
                    };
                });

                if (targetMonth !== currentMonth) {
                    setCurrentMonth(targetMonth);
                }

                setNotification('extra');
                setTimeout(() => setNotification(null), 2500);
                setExtraPointInput(""); 
                setExtraPointNote("");
            };

            const handleDownloadPDF = () => {
                // บังคับสลับไปหน้าสรุปผลก่อนพิมพ์
                setActiveTab('summary');
                
                // ให้เวลา React เรนเดอร์หน้าตาราง แล้วเรียกหน้าต่าง Print ของเบราว์เซอร์
                setTimeout(() => {
                    window.print();
                }, 300);
            };

            const staffScores = useMemo(() => {
                return visibleStaff.map(person => {
                    let totalPoints = 0;
                    let totalMachines = 0;
                    const personRecords = records[person.id] || {};
                    
                    Object.entries(personRecords).forEach(([modelId, count]) => {
                        const model = modelList.find(m => m.id === modelId);
                        if (model) {
                            totalPoints += count * model.points;
                            totalMachines += count;
                        }
                    });

                    totalPoints += (extraPoints[person.id] || 0);

                    const autoDays = calculateAutoDaysLeft(currentMonth, person);
                    const activeDays = customDaysLeft[person.id] !== undefined ? customDaysLeft[person.id] : autoDays;
                    const daysToDivide = activeDays > 0 ? activeDays : 1; 

                    return {
                        ...person,
                        totalPoints,
                        totalMachines,
                        autoDays,
                        activeDays,
                        missingPoints: Math.max(0, person.kpi - totalPoints),
                        pointsPerDayNeeded: Math.max(0, (person.kpi - totalPoints) / daysToDivide)
                    };
                });
            }, [records, extraPoints, currentMonth, customDaysLeft, visibleStaff]);

            const groupedLogs = useMemo(() => {
                const groups = {};
                logs.forEach(log => {
                    const dateObj = new Date(log.timestamp);
                    const dateStr = dateObj.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    
                    if (!groups[dateStr]) {
                        groups[dateStr] = [];
                    }
                    groups[dateStr].push(log);
                });
                return groups;
            }, [logs]);

            return (
                <div className="min-h-screen bg-slate-50/50 p-3 sm:p-4 md:p-8 pb-20 w-full overflow-x-hidden">
                    
                    {/* Header Section (Dark Theme UI) */}
                    <div className="max-w-6xl mx-auto mb-6 sm:mb-8 print:hidden w-full">
                        <div className="relative bg-[#172033] rounded-[1.5rem] sm:rounded-[2rem] p-5 sm:p-6 md:p-10 shadow-xl overflow-hidden border border-[#2a364f] w-full">
                            
                            {/* Background Grid Pattern */}
                            <div 
                                className="absolute inset-0 opacity-[0.04] pointer-events-none" 
                                style={{ 
                                    backgroundImage: 'linear-gradient(to right, #ffffff 1px, transparent 1px), linear-gradient(to bottom, #ffffff 1px, transparent 1px)', 
                                    backgroundSize: '24px 24px' 
                                }}
                            ></div>
                            
                            {/* Background Glow Effect */}
                            <div className="absolute -top-32 -right-32 w-96 h-96 bg-brand-500/20 rounded-full blur-[80px] pointer-events-none"></div>
                            
                            <div className="relative z-10 flex flex-col lg:flex-row lg:items-end justify-between gap-5 sm:gap-8 w-full">
                                <div className="flex-1 min-w-0">
                                    {/* Badge */}
                                    <div className="inline-flex items-center gap-2.5 px-3 sm:px-4 py-1.5 rounded-full bg-[#2a364f]/80 border border-[#3b4b6b] text-slate-300 text-[12px] sm:text-[13px] font-medium mb-4 sm:mb-6 backdrop-blur-sm shadow-sm">
                                        <ActivityIcon className="w-3.5 h-3.5 sm:w-4 sm:h-4 text-white shrink-0" />
                                        <span className="truncate">พื้นที่แชร์ข้อมูลทีม</span>
                                    </div>
                                    
                                    {/* Title */}
                                    <h1 className="text-2xl sm:text-3xl md:text-[42px] font-extrabold tracking-tight mb-2 sm:mb-3 leading-tight break-words">
                                        <span className="text-white">MODIFY TEAM </span>
                                        <span className="text-[#a8c7fa]">DASHBOARD</span>
                                    </h1>
                                    
                                    {/* Subtitle */}
                                    <p className="text-slate-400 text-[13px] sm:text-sm md:text-[15px] font-medium max-w-2xl leading-relaxed">
                                        ตรวจสอบยอดคะแนน รายละเอียดเครื่อง และประวัติการทำงานย้อนหลังแบบเรียลไทม์
                                    </p>
                                </div>
                                
                                {/* Action Controls */}
                                <div className="flex flex-col sm:flex-row flex-wrap items-start lg:items-center gap-3 flex-shrink-0 w-full lg:w-auto mt-2 lg:mt-0">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full sm:w-auto">
                                        <button 
                                            onClick={() => setIsModelModalOpen(true)}
                                            className="flex items-center justify-center gap-2 px-4 sm:px-5 py-2.5 rounded-xl font-bold text-[13px] sm:text-sm transition-all w-full bg-[#212c42] hover:bg-[#2a364f] text-white border border-[#344361] shadow-sm"
                                        >
                                            <BoxIcon className="w-4 h-4 shrink-0" />
                                            จัดการรุ่นเครื่อง
                                        </button>
                                        <button 
                                            onClick={() => setIsStaffModalOpen(true)}
                                            className="flex items-center justify-center gap-2 px-4 sm:px-5 py-2.5 rounded-xl font-bold text-[13px] sm:text-sm transition-all w-full bg-[#212c42] hover:bg-[#2a364f] text-white border border-[#344361] shadow-sm"
                                        >
                                            <UsersIcon className="w-4 h-4 shrink-0" />
                                            จัดการพนักงาน
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full sm:w-auto">
                                        <div className="flex items-center gap-2 bg-[#212c42] border border-[#344361] rounded-xl px-3 sm:px-4 py-2.5 transition-colors focus-within:border-brand-500/60 shadow-inner w-full">
                                            <CalendarIcon className="w-4 h-4 text-slate-400 shrink-0" />
                                            <span className="text-slate-400 text-[13px] sm:text-sm font-medium whitespace-nowrap shrink-0">ประจำเดือน:</span>
                                            <input 
                                                type="month" 
                                                value={currentMonth}
                                                onChange={(e) => setCurrentMonth(e.target.value)}
                                                className="bg-transparent text-white font-semibold outline-none text-[13px] sm:text-sm cursor-pointer w-full min-w-0"
                                                style={{ colorScheme: 'dark' }}
                                            />
                                        </div>
                                        
                                        <button 
                                            onClick={handleDownloadPDF}
                                            className="flex items-center justify-center gap-2 px-4 sm:px-6 py-2.5 rounded-xl font-bold text-[13px] sm:text-sm transition-all w-full bg-brand-600 hover:bg-brand-500 text-white border border-brand-500 shadow-[0_0_20px_rgba(37,99,235,0.25)] active:scale-[0.98]"
                                        >
                                            <PrinterIcon className="w-4 h-4 shrink-0" />
                                            พิมพ์ / PDF
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 sm:gap-8 print:block print:max-w-none w-full">
                        
                        {/* เลนซ้าย: ฟอร์มเพิ่มข้อมูล */}
                        <div className="lg:col-span-4 space-y-6 print:hidden">
                            
                            {/* Card: บันทึกเครื่อง */}
                            <div className="bg-white rounded-2xl shadow-card p-6 relative transition-all">
                                <h2 className="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2.5">
                                    <div className="p-1.5 bg-brand-50 text-brand-600 rounded-lg">
                                        <PlusCircleIcon className="w-5 h-5" />
                                    </div>
                                    บันทึกเครื่องโมดิฟายด์
                                </h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[13px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">วันที่บันทึก</label>
                                        <input 
                                            type="date"
                                            className="w-full border border-slate-200 bg-white rounded-xl p-2.5 font-medium text-slate-800 focus:ring-4 focus:ring-brand-50 focus:border-brand-500 hover:border-brand-300 outline-none transition-all shadow-sm"
                                            value={recordDate}
                                            onChange={(e) => setRecordDate(e.target.value)}
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">ชื่อพนักงาน</label>
                                        <SearchableSelect 
                                            options={staffOptions} 
                                            value={selectedStaff} 
                                            onChange={setSelectedStaff} 
                                            placeholder="ค้นหาชื่อพนักงาน..."
                                            containerClass="border-slate-200"
                                            activeBgClass="bg-brand-50 text-brand-700"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">รุ่นเครื่อง</label>
                                        <SearchableSelect 
                                            options={MODEL_OPTIONS} 
                                            value={selectedModel} 
                                            onChange={setSelectedModel} 
                                            placeholder="ค้นหารุ่นเครื่อง..."
                                            containerClass="border-slate-200"
                                            activeBgClass="bg-brand-50 text-brand-700"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[13px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">จำนวนเครื่อง</label>
                                        <input 
                                            type="number" 
                                            min="1"
                                            className="w-full border border-slate-200 bg-white rounded-xl p-2.5 font-medium text-slate-800 focus:ring-4 focus:ring-brand-50 focus:border-brand-500 hover:border-brand-300 outline-none transition-all shadow-sm"
                                            value={quantity}
                                            onChange={(e) => setQuantity(e.target.value)}
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-3">
                                        <button 
                                            onClick={() => handleUpdateRecord(true)}
                                            className="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-2 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-sm text-sm active:scale-[0.98]"

                                                                                <span className="text-[11px] text-slate-400 font-bold w-10 shrink-0">{timeStr}</span>
                                                                                <span className={`flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-md ${isAdd ? 'bg-brand-50 text-brand-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                                    {isAdd ? <PlusCircleIcon className="w-3.5 h-3.5"/> : <MinusCircleIcon className="w-3.5 h-3.5"/>}
                                                                                </span>
                                                                                <div className="flex flex-wrap items-center gap-1.5 min-w-0">
                                                                                    <span className="font-bold text-slate-700 truncate">{staff}</span>
                                                                                    <span className="text-slate-500">{isAdd ? 'บันทึก' : 'ลบ'}&nbsp;<strong className="text-slate-800">{modelName}</strong></span>
                                                                                </div>
                                                                            </div>
                                                                            <div className="font-bold text-slate-700 flex flex-wrap items-center gap-2 pl-12 md:pl-0 flex-shrink-0">
                                                                                {isAdd ? '+' : ''}{log.amount} <span className="text-[11px] text-slate-400 font-medium">เครื่อง</span>
                                                                                <span className={`text-[11px] px-2 py-0.5 rounded-md border whitespace-nowrap ${isAdd ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                                                                                    {isAdd ? '+' : ''}{pointEarned.toFixed(2)} pt
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                } else if (log.type === 'extra') {
                                                                    const isAdd = log.points > 0;
                                                                    return (
                                                                        <div key={log.id} className="bg-amber-50/30 p-3.5 rounded-xl border border-amber-100/50 shadow-sm text-[13px] flex flex-col md:flex-row md:justify-between md:items-center gap-3 hover:border-amber-200 transition-colors w-full break-words">
                                                                            <div className="flex items-center gap-3.5 flex-1 min-w-0">
                                                                                <span className="text-[11px] text-slate-400 font-bold w-10 shrink-0">{timeStr}</span>
                                                                                <span className={`flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-md ${isAdd ? 'bg-amber-100 text-amber-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                                    <StarIcon className="w-3.5 h-3.5"/>
                                                                                </span>
                                                                                <div className="flex flex-wrap items-center gap-1.5 min-w-0">
                                                                                    <span className="font-bold text-slate-700 truncate">{staff}</span>
                                                                                    <span className="text-amber-700 font-medium">บันทึกคะแนนเสริม</span>

                                                                                </div>
                                                                            </div>
                                                                            <div className="font-bold text-amber-600 pl-12 md:pl-0 flex-shrink-0">
                                                                                {isAdd ? '+' : ''}{log.points} <span className="text-[11px] text-amber-400 font-medium">pt</span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* 3. โหมดสรุปรายเดือนย้อนหลัง (ซ่อนตอนปรินต์) */}

                                                        </th>
                                                    ))}
                                                    <th className="px-6 py-4 text-center rounded-tr-lg">จัดการ</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {Object.keys(db).sort().reverse().map(monthKey => {
                                                    const mData = db[monthKey];
                                                    const [y, m] = monthKey.split('-');
                                                    const monthName = new Date(y, m - 1).toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

                                                    return (
                                                        <tr key={monthKey} className="hover:bg-slate-50/50 transition-colors group">
                                                            <td className="px-6 py-4 font-bold text-slate-700">
                                                                <div className="flex items-center gap-2">
                                                                    <CalendarIcon className="w-4 h-4 text-slate-400 group-hover:text-brand-500 transition-colors" />
                                                                    {monthName}
                                                                </div>
                                                            </td>
                                                            {staffList.map(staff => {
                                                                let totalPoints = 0;
                                                                let totalMachines = 0;
                                                                const pRecs = mData.records?.[staff.id] || {};
                                                                Object.entries(pRecs).forEach(([modelId, count]) => {
                                                                    const model = modelList.find(m => m.id === modelId);
                                                                    if (model) {
                                                                        totalPoints += count * model.points;
                                                                        totalMachines += count;
                                                                    }
                                                                });
                                                                totalPoints += (mData.extraPoints?.[staff.id] || 0);
                                                                
                                                                const isGood = totalPoints >= staff.kpi;
                                                                const staffEndMonth = staff.endDate ? staff.endDate.substring(0, 7) : null;
                                                                const isResignedInThisMonth = staffEndMonth && monthKey > staffEndMonth;

                                                                return (
                                                                    <td key={staff.id} className={`px-6 py-4 text-center ${totalPoints > 0 ? (isGood ? 'text-emerald-600' : 'text-slate-600') : 'text-slate-300'}`}>

                                                                            <div className="flex flex-col items-center gap-1">
                                                                                <span className={`inline-flex items-center justify-center px-2.5 py-1 rounded-md font-bold ${isGood ? 'bg-emerald-50' : 'bg-slate-50'}`}>
                                                                                    {totalPoints.toFixed(2)}
                                                                                </span>
                                                                                <span className="text-[11px] font-medium text-slate-400">
                                                                                    {totalMachines} เครื่อง
                                                                                </span>
                                                                            </div>
                                                                        ) : (
                                                                            isResignedInThisMonth ? <span className="text-slate-200">-</span> : '-'
                                                                        )}
                                                                    </td>
                                                                );
                                                            })}

                                                                <button 
                                                                    onClick={() => { setCurrentMonth(monthKey); setActiveTab('summary'); }}
                                                                    className="px-3 py-1.5 bg-brand-50 text-brand-600 hover:bg-brand-100 rounded-lg text-[12px] font-semibold transition-colors active:scale-[0.98]"
                                                                >
                                                                    ดูรายละเอียด
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                        {Object.keys(db).length === 0 && (
                                            <div className="text-center text-slate-400 py-16">ยังไม่มีข้อมูลในระบบ</div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </div>
                        {/* จบพื้นที่สำหรับ PDF */}

                    </div>

                    {/* --- Modal จัดการพนักงาน --- */}

                                                            {staff.name}
                                                            {staff.endDate && <span className="px-2 py-0.5 text-[10px] bg-rose-100 text-rose-700 rounded-full font-bold">ลาออกแล้ว ({staff.endDate})</span>}
                                                        </div>
                                                        <div className="text-[12px] text-slate-500 mt-1">
                                                            ตำแหน่ง: <span className="font-medium text-slate-700">{staff.role}</span> | KPI: <span className="font-medium text-brand-600">{staff.kpi}</span>
                                                        </div>
                                                        <div className="text-[11px] text-slate-400 mt-1 flex items-center gap-1">
                                                            <span>เข้าเสาร์ที่:</span> 
                                                            {staff.satWork && staff.satWork.length > 0 ? (
                                                                <div className="flex gap-1">
                                                                    {staff.satWork.map(w => <span key={w} className="bg-slate-100 px-1.5 rounded">{w}</span>)}

                                                    </div>
                                                    <button onClick={() => handleEditStaff(staff)} className="p-1.5 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors">
                                                        <EditIcon className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* ฟอร์มเพิ่ม/แก้ไขพนักงาน */}
                                    <div className="w-full md:w-1/2 p-6 overflow-y-visible md:overflow-y-auto bg-slate-50 hide-scrollbar flex flex-col h-auto md:h-full">
                                        <h3 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
                                            <span>{staffForm.id ? 'แก้ไขข้อมูลพนักงาน' : 'เพิ่มพนักงานใหม่'}</span>
                                            {staffForm.id && <button onClick={handleCancelEdit} className="text-[12px] text-brand-600 font-medium hover:underline">ยกเลิกการแก้ไข</button>}
                                        </h3>
                                        
                                        {staffError && <div className="mb-4 p-3 bg-rose-50 text-rose-600 text-[13px] font-bold rounded-lg border border-rose-100">{staffError}</div>}

                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">ชื่อพนักงาน *</label>
                                                <input type="text" value={staffForm.name} onChange={e => setStaffForm({...staffForm, name: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none" placeholder="ระบุชื่อพนักงาน" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[13px] font-bold text-slate-600 mb-1.5">ตำแหน่ง *</label>
                                                    <input type="text" value={staffForm.role} onChange={e => setStaffForm({...staffForm, role: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-[13px] font-bold text-slate-600 mb-1.5">KPI ต่อเดือน *</label>
                                                    <input type="number" value={staffForm.kpi} onChange={e => setStaffForm({...staffForm, kpi: Number(e.target.value)})} className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">วันเสาร์ที่ทำงาน <span className="font-normal text-slate-400">(สัปดาห์ที่)</span></label>
                                                <div className="flex gap-2 flex-wrap">
                                                    {[1, 2, 3, 4, 5].map(week => {
                                                        const isSelected = staffForm.satWork && staffForm.satWork.includes(week);
                                                        return (
                                                            <button 
                                                                key={week}
                                                                onClick={() => toggleSatWork(week)}
                                                                className={`w-10 h-10 rounded-lg text-sm font-bold border transition-all ${isSelected ? 'bg-brand-500 text-white border-brand-500 shadow-md' : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'}`}
                                                            >
                                                                {week}
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                            <div className="pt-2 border-t border-slate-200 mt-2">
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">วันที่ลาออก <span className="font-normal text-rose-400">(ถ้ามี)</span></label>
                                                <input type="date" value={staffForm.endDate} onChange={e => setStaffForm({...staffForm, endDate: e.target.value})} className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-rose-100 focus:border-rose-400 outline-none text-slate-700" />

                                            <button

                                                className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-colors shadow-sm"

                                                {staffForm.id ? 'บันทึกการแก้ไข' : 'เพิ่มพนักงานใหม่'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Modal จัดการรุ่นเครื่อง --- */}
                    {isModelModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm print:hidden">

                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <BoxIcon className="w-6 h-6 text-brand-600" />
                                        จัดการข้อมูลรุ่นเครื่อง

                                    <button onClick={() => setIsModelModalOpen(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors">
                                        <XIcon className="w-5 h-5 text-slate-500" />

                                </div>
                                
                                <div className="flex flex-col md:flex-row flex-1 overflow-y-auto md:overflow-hidden">
                                    {/* รายการรุ่นเครื่อง */}

                                                        <div className="font-bold text-slate-800 flex items-center gap-2">
                                                            {model.name}
                                                        </div>
                                                        <div className="text-[12px] text-slate-500 mt-1 flex items-center gap-2">
                                                            <span>รหัส: <span className="font-medium text-slate-700 bg-slate-100 px-1 rounded">{model.id}</span></span>
                                                            <span className="text-slate-300">|</span>
                                                            <span>คะแนน: <span className="font-bold text-brand-600">{model.points} pt</span></span>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => handleEditModel(model)} className="p-1.5 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors opacity-100 md:opacity-0 md:group-hover:opacity-100">
                                                        <EditIcon className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* ฟอร์มเพิ่ม/แก้ไขรุ่นเครื่อง */}
                                    <div className="w-full md:w-1/2 p-6 overflow-y-visible md:overflow-y-auto bg-slate-50 hide-scrollbar flex flex-col h-auto md:h-full">
                                        <h3 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
                                            <span>{isEditingModel ? 'แก้ไขข้อมูลรุ่นเครื่อง' : 'เพิ่มรุ่นเครื่องใหม่'}</span>
                                            {isEditingModel && <button onClick={handleCancelEditModel} className="text-[12px] text-brand-600 font-medium hover:underline">ยกเลิกการแก้ไข</button>}
                                        </h3>
                                        
                                        {modelError && <div className="mb-4 p-3 bg-rose-50 text-rose-600 text-[13px] font-bold rounded-lg border border-rose-100">{modelError}</div>}

                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">รหัสเครื่อง (ID) *</label>
                                                <input 
                                                    type="text" 
                                                    value={modelForm.id} 
                                                    onChange={e => setModelForm({...modelForm, id: e.target.value})} 
                                                    className={`w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none ${isEditingModel ? 'bg-slate-200 text-slate-500 cursor-not-allowed' : 'bg-white'}`} 
                                                    placeholder="เช่น CABIN-NEW" 
                                                    disabled={isEditingModel}
                                                />
                                                <p className="text-[11px] text-slate-400 mt-1">ใช้สำหรับอ้างอิงในระบบ (แก้ไขไม่ได้หลังจากสร้างแล้วเพื่อป้องกันข้อมูลเดิมสูญหาย)</p>
                                            </div>
                                            <div>
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">ชื่อรุ่นที่แสดงผล *</label>
                                                <input 
                                                    type="text" 
                                                    value={modelForm.name} 
                                                    onChange={e => setModelForm({...modelForm, name: e.target.value})} 
                                                    className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none" 
                                                    placeholder="เช่น CABIN V.2" 
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-[13px] font-bold text-slate-600 mb-1.5">คะแนนต่อเครื่อง *</label>
                                                <input 
                                                    type="number" 
                                                    step="0.01"
                                                    value={modelForm.points} 
                                                    onChange={e => setModelForm({...modelForm, points: e.target.value})} 
                                                    className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-brand-100 focus:border-brand-500 outline-none"

                                            </div>
                                        </div>

                                        <div className="mt-auto pt-6">

                                                className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-colors shadow-sm"
                                            >
                                                {isEditingModel ? 'บันทึกการแก้ไข' : 'เพิ่มรุ่นเครื่องใหม่'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

            /* บังคับคลาสของ Tailwind ให้ทำงานตอน Print */

            .print\:m-0 { margin: 0 !important; }

            /* ป้องกันไม่ให้ตารางหรือการ์ดโดนตัดขาดครึ่งบรรทัดเวลาขึ้นหน้าใหม่ */
            tr, .shadow-card {

            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }

            /* บังคับให้พิมพ์สีพื้นหลังของตารางและการ์ด (เช่น สีเขียว ทะลุเป้า) */
            * {

        }
    </style>
