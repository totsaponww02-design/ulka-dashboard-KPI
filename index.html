<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามคะแนนทีมโมดิฟายด์</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ตั้งค่าฟอนต์ Google Fonts -->

    <!-- นำเข้า React และ ReactDOM -->

    <!-- นำเข้า html2pdf.js สำหรับสร้าง PDF -->

    <style>
        body {

            color: #334155; /* slate-700 */

        ::-webkit-scrollbar {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ไอคอน (Lucide Icons) ---
        const WrenchIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const PlusCircleIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
        const MinusCircleIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>;
        const TrophyIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const UserIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const AlertCircleIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const CalendarClockIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><path d="M22 16a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z"/></svg>;
        const StarIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const CheckCircleIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const DownloadIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const HistoryIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;

        // --- ข้อมูลโมเดลและคะแนน ---
        const MODELS = [
            { id: 'U5', name: 'U5', points: 0.92 },
            { id: 'P3B', name: 'P3B', points: 0.92 },
            { id: 'PROSODA', name: 'PROSODA', points: 1.15 },
            { id: 'PROSODA-MAX', name: 'PROSODA-MAX', points: 1.15 },
            { id: 'RO-G600', name: 'RO-G600', points: 1.15 },
            { id: 'Prosoda-G15Pro', name: 'Prosoda-G15Pro', points: 1.15 },
            { id: 'Prosoda-G830', name: 'Prosoda-G830', points: 1.15 },
            { id: '15AF', name: '15AF', points: 1.495 },
            { id: '20AF', name: '20AF', points: 1.495 },
            { id: '9CN', name: '9CN', points: 1.495 },
            { id: 'MC13D', name: 'MC13D', points: 1.495 },
            { id: '13F', name: '13F', points: 1.725 },
            { id: 'CABIN-500XJ', name: 'CABIN-500XJ', points: 1.909 },
            { id: 'CABIN-700XJ', name: 'CABIN-700XJ', points: 1.909 },
            { id: '45F', name: '45F', points: 2.001 },
            { id: '45M', name: '45M', points: 2.001 },
            { id: '65S', name: '65S', points: 2.001 },
            { id: '12A', name: '12A', points: 2.001 },
            { id: 'FE151', name: 'FE151', points: 2.001 },
            { id: 'FE301', name: 'FE301', points: 2.001 },
            { id: 'FE302', name: 'FE302', points: 2.001 },
            { id: 'BLENDER-2A', name: 'BLENDER-2A', points: 2.001 },
            { id: '38F', name: '38F', points: 2.392 },
            { id: '120F', name: '120F', points: 2.392 },
            { id: 'BLENDER', name: 'BLENDER', points: 2.392 },
            { id: 'BLENDER-2B', name: 'BLENDER-2B', points: 2.392 },
            { id: 'CABIN', name: 'CABIN', points: 2.99 },
            { id: '07S', name: '07S', points: 2.99 },
            { id: 'S72C', name: 'S72C', points: 2.99 },
            { id: 'S9C', name: 'S9C', points: 2.99 },
            { id: 'SA53', name: 'SA53', points: 2.99 },
            { id: 'SA56', name: 'SA56', points: 2.99 },
            { id: 'FE401', name: 'FE401', points: 2.99 },
            { id: 'FE351', name: 'FE351', points: 2.99 },
            { id: 'FE451', name: 'FE451', points: 2.99 },
            { id: '13F_FLOAT', name: '13F (FLOATBALL)', points: 2.99 },
            { id: '220F', name: '220F', points: 3.979 },
            { id: '350F', name: '350F', points: 3.979 },
            { id: 'M7A', name: 'M7A', points: 3.979 },
            { id: 'M97A', name: 'M97A', points: 3.979 },
            { id: 'M6A', name: 'M6A', points: 3.979 },
            { id: 'FE151_FS', name: 'FE151 (FOOTSWITCH)', points: 3.979 },
            { id: 'FE301_FS', name: 'FE301 (FOOTSWITCH)', points: 3.979 },
            { id: 'FE801', name: 'FE801', points: 3.979 },
            { id: '20AF_FLOAT', name: '20AF (FLOATBALL)', points: 3.979 },
            { id: '100XJ', name: '100XJ', points: 5.98 },
            { id: '150XJ', name: '150XJ', points: 5.98 },
            { id: '500XJ', name: '500XJ', points: 5.98 },
            { id: '700XJ', name: '700XJ', points: 5.98 },
            { id: 'T100', name: 'T100', points: 5.98 },
            { id: '1400XJ', name: '1400XJ', points: 11.96 },
            { id: 'CABIN-1400XJ', name: 'CABIN-1400XJ', points: 11.96 }
        ];

        // --- กำหนดวันเสาร์ที่ทำงาน ---
        const STAFF = [
            { id: 'nakrob', name: 'นักรบ', role: 'โมดิฟาย/แพ็ค', kpi: 156, satWork: [2, 4] },
            { id: 'amin', name: 'อามิน', role: 'โมดิฟาย/แพ็ค', kpi: 312, satWork: [2, 4] },
            { id: 'guy', name: 'กาย', role: 'โมดิฟาย', kpi: 312, satWork: [1, 3] },
            { id: 'pman', name: 'พี่แมน', role: 'โมดิฟาย', kpi: 156, satWork: [1, 3] }
        ];

        // ฟังก์ชันคำนวณวันทำงานที่เหลือแบบออโต้รายบุคคล
        const calculateAutoDaysLeft = (monthStr, staff) => {
            const today = new Date();
            const currentY = today.getFullYear();
            const currentM = today.getMonth() + 1;
            
            const [targetY, targetM] = monthStr.split('-').map(Number);

            let startDay = 1;
            // ถ้าเป็นเดือนปัจจุบัน ให้เริ่มนับจากวันนี้
            if (targetY === currentY && targetM === currentM) {
                startDay = today.getDate();
            } else if (targetY < currentY || (targetY === currentY && targetM < currentM)) {
                return 0; // เดือนที่ผ่านไปแล้ว ไม่มีวันทำงานเหลือ
            }

            const daysInMonth = new Date(targetY, targetM, 0).getDate();
            let count = 0;

            for (let d = startDay; d <= daysInMonth; d++) {
                const dateObj = new Date(targetY, targetM - 1, d);
                const dayOfWeek = dateObj.getDay();

                if (dayOfWeek >= 1 && dayOfWeek <= 5) { 
                    // วันจันทร์ - ศุกร์ ทำงานทุกคน
                    count++;
                } else if (dayOfWeek === 6) { 
                    // วันเสาร์ เช็คว่าตรงกับสัปดาห์ที่พนักงานคนนี้ต้องทำไหม
                    const weekOfMonth = Math.ceil(d / 7);
                    if (staff.satWork.includes(weekOfMonth)) {
                        count++;
                    }
                }
            }
            return count;
        };

        const getCurrentMonthStr = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        };

        const getInitialDatabase = () => {
            const savedData = localStorage.getItem('modifyTeamData');
            if (savedData) {
                return JSON.parse(savedData);
            }
            const initialMonth = '2026-04';
            return {
                [initialMonth]: {
                    records: {
                        nakrob: { '15AF': 5, '20AF': 7, '07S': 3, 'PROSODA': 2, 'RO-G600': 1, 'BLENDER': 3 },
                        amin: { '20AF': 4, '100XJ': 1, '07S': 3, 'M7A': 1, 'U5': 1 },
                        guy: { '20AF': 6, '38F': 4, 'M7A': 2, 'FE301': 4, 'PROSODA-MAX': 1, 'U5': 1, 'RO-G600': 1, 'P3B': 1, '13F_FLOAT': 1 },
                        pman: {}
                    },
                    extraPoints: { nakrob: 0, amin: 0, guy: 0, pman: 0 },
                    customDaysLeft: {} // เก็บค่าที่ถูกแก้ไข manual
                }
            };
        };

        function App() {
            const [db, setDb] = useState(getInitialDatabase);
            const [currentMonth, setCurrentMonth] = useState('2026-04'); 

            const currentMonthData = db[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {} };
            const records = currentMonthData.records || {};
            const extraPoints = currentMonthData.extraPoints || {};
            const customDaysLeft = currentMonthData.customDaysLeft || {};

            const [selectedStaff, setSelectedStaff] = useState(STAFF[0].id);
            const [selectedModel, setSelectedModel] = useState(MODELS[0].id);
            const [quantity, setQuantity] = useState(1);

            const [selectedStaffExtra, setSelectedStaffExtra] = useState(STAFF[0].id);
            const [extraPointInput, setExtraPointInput] = useState("");
            
            const [isDownloading, setIsDownloading] = useState(false);
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                localStorage.setItem('modifyTeamData', JSON.stringify(db));
            }, [db]);

            const updateCurrentMonthData = (updaterFn) => {
                setDb(prevDb => {
                    const oldData = prevDb[currentMonth] || { records: {}, extraPoints: {}, customDaysLeft: {} };
                    return {
                        ...prevDb,
                        [currentMonth]: updaterFn(oldData)
                    };
                });
            };

            const handleUpdateRecord = (isAdding) => {
                const amount = isAdding ? Number(quantity) : -Number(quantity);
                if (amount === 0 || isNaN(amount)) return;

                updateCurrentMonthData(prevData => {
                    const safeRecords = prevData.records || {};
                    const staffRecords = safeRecords[selectedStaff] || {};
                    const currentCount = staffRecords[selectedModel] || 0;
                    const newCount = Math.max(0, currentCount + amount); 
                    return {
                        ...prevData,
                        records: {
                            ...safeRecords,
                            [selectedStaff]: {
                                ...staffRecords,
                                [selectedModel]: newCount
                            }
                        }
                    };
                });
                
                setNotification(isAdding ? 'add' : 'remove');
                setTimeout(() => setNotification(null), 2500);
                setQuantity(1); 
            };

            const handleAddExtraPoints = () => {
                const points = Number(extraPointInput);
                if (isNaN(points)) return;

                updateCurrentMonthData(prevData => {
                    const currentExtra = prevData.extraPoints || {};
                    return {
                        ...prevData,
                        extraPoints: {
                            ...currentExtra,
                            [selectedStaffExtra]: (currentExtra[selectedStaffExtra] || 0) + points
                        }
                    };
                });

                setNotification('extra');
                setTimeout(() => setNotification(null), 2500);
                setExtraPointInput(""); 
            };

            const handleCustomDaysChange = (staffId, val) => {
                updateCurrentMonthData(prevData => {
                    const newCustom = { ...(prevData.customDaysLeft || {}) };
                    if (val === '') {
                        delete newCustom[staffId]; // ถ้าลบช่องทิ้ง ให้กลับไปใช้ค่าออโต้
                    } else {
                        newCustom[staffId] = Number(val);
                    }
                    return { ...prevData, customDaysLeft: newCustom };
                });
            };

            const handleDownloadPDF = () => {
                setIsDownloading(true);
                const element = document.getElementById('printable-area');
                
                const opt = {
                    margin:       [0.5, 0.5, 0.5, 0.5], 
                    filename:     `สรุปคะแนนทีมโมดิฟายด์_${currentMonth}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    setIsDownloading(false);
                });
            };

            const staffScores = useMemo(() => {
                return STAFF.map(person => {
                    let totalPoints = 0;
                    const personRecords = records[person.id] || {};
                    
                    Object.entries(personRecords).forEach(([modelId, count]) => {
                        const model = MODELS.find(m => m.id === modelId);
                        if (model) totalPoints += count * model.points;
                    });

                    totalPoints += (extraPoints[person.id] || 0);

                    // คำนวณวันทำงานออโต้
                    const autoDays = calculateAutoDaysLeft(currentMonth, person);
                    // ใช้วันทำงานที่ผู้ใช้แก้ (ถ้ามี) ถ้าไม่มีใช้ออโต้
                    const activeDays = customDaysLeft[person.id] !== undefined ? customDaysLeft[person.id] : autoDays;
                    
                    const daysToDivide = activeDays > 0 ? activeDays : 1; 

                    return {
                        ...person,
                        totalPoints,
                        autoDays,
                        activeDays,
                        missingPoints: Math.max(0, person.kpi - totalPoints),
                        pointsPerDayNeeded: Math.max(0, (person.kpi - totalPoints) / daysToDivide)
                    };
                });
            }, [records, extraPoints, currentMonth, customDaysLeft]);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 pb-20">
                    
                    {/* Header Section */}
                    <div className="max-w-6xl mx-auto mb-8">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-5 rounded-3xl shadow-sm border border-slate-200/60">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/30 text-white">
                                    <WrenchIcon className="w-7 h-7" />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-indigo-800 tracking-tight">
                                        ระบบติดตามคะแนนทีมโมดิฟายด์
                                    </h1>
                                    <div className="flex items-center gap-3 text-slate-500 font-medium text-sm mt-1">
                                        <span className="flex items-center gap-1"><HistoryIcon className="w-4 h-4"/> ประจำเดือน:</span>
                                        <input 
                                            type="month" 
                                            value={currentMonth}
                                            onChange={(e) => setCurrentMonth(e.target.value)}
                                            className="bg-slate-100 border border-slate-200 rounded-md px-2 py-0.5 text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400"
                                        />
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={handleDownloadPDF}
                                    disabled={isDownloading}
                                    className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm
                                        ${isDownloading ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 hover:text-emerald-800'}`}
                                >
                                    <DownloadIcon className="w-4 h-4" />
                                    {isDownloading ? 'กำลังสร้าง PDF...' : 'ดาวน์โหลดรายงาน PDF'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* เลนซ้าย: ฟอร์มเพิ่มข้อมูล */}
                        <div className="lg:col-span-4 space-y-6">
                            
                            {/* Card: บันทึกเครื่อง */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6 relative overflow-hidden transition-all hover:shadow-md">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-indigo-100 to-transparent rounded-bl-full opacity-50 pointer-events-none"></div>

                                <h2 className="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2 relative z-10">
                                    <div className="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg">
                                        <PlusCircleIcon className="w-5 h-5" />
                                    </div>
                                    บันทึกเครื่องโมดิฟายด์
                                </h2>
                                
                                <div className="space-y-4 relative z-10">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-600 mb-1.5">ชื่อพนักงาน</label>
                                        <select 
                                            className="w-full border-slate-200 bg-slate-50 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm border"
                                            value={selectedStaff}
                                            onChange={(e) => setSelectedStaff(e.target.value)}
                                        >
                                            {STAFF.map(s => (
                                                <option key={s.id} value={s.id}>{s.name} ({s.role})</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-slate-600 mb-1.5">รุ่นเครื่อง</label>
                                        <select 
                                            className="w-full border-slate-200 bg-slate-50 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm border"
                                            value={selectedModel}
                                            onChange={(e) => setSelectedModel(e.target.value)}
                                        >
                                            {MODELS.map(m => (
                                                <option key={m.id} value={m.id}>{m.name} <span className="text-slate-400">(+{m.points} pt)</span></option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-slate-600 mb-1.5">จำนวนเครื่อง</label>
                                        <input 
                                            type="number" 
                                            min="1"
                                            className="w-full border-slate-200 bg-white rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm border"
                                            value={quantity}
                                            onChange={(e) => setQuantity(e.target.value)}
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-3">
                                        <button 
                                            onClick={() => handleUpdateRecord(true)}
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-2 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-md shadow-indigo-500/20 text-sm active:scale-[0.98]"
                                        >
                                            <PlusCircleIcon className="w-4 h-4" />
                                            บันทึกเพิ่ม
                                        </button>
                                        <button 
                                            onClick={() => handleUpdateRecord(false)}
                                            className="w-full bg-white hover:bg-rose-50 text-rose-600 border border-rose-200 font-semibold py-3 px-2 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-sm text-sm active:scale-[0.98]"
                                        >
                                            <MinusCircleIcon className="w-4 h-4" />
                                            ลบข้อมูล
                                        </button>
                                    </div>

                                    {notification === 'add' && (
                                        <div className="p-3.5 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-xl text-sm font-medium flex items-center gap-2 animate-[pulse_1s_ease-in-out]">
                                            <CheckCircleIcon className="w-5 h-5 text-emerald-500" /> บันทึกคะแนนสำเร็จ!
                                        </div>
                                    )}
                                    {notification === 'remove' && (
                                        <div className="p-3.5 bg-rose-50 border border-rose-100 text-rose-700 rounded-xl text-sm font-medium flex items-center gap-2">
                                            <AlertCircleIcon className="w-5 h-5 text-rose-500" /> ลบข้อมูลเรียบร้อย
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Card: บันทึกคะแนนเสริม */}
                            <div className="bg-gradient-to-br from-amber-50 to-orange-50/30 rounded-3xl shadow-sm border border-amber-200/60 p-6 transition-all hover:shadow-md">
                                <h2 className="text-lg font-bold text-amber-900 mb-5 flex items-center gap-2">
                                    <div className="p-1.5 bg-amber-100 text-amber-600 rounded-lg">
                                        <StarIcon className="w-5 h-5" />
                                    </div>
                                    บันทึกคะแนนเสริม
                                </h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-amber-800 mb-1.5">ชื่อพนักงาน</label>
                                        <select 
                                            className="w-full border-amber-200 bg-white rounded-xl p-3 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none shadow-sm border transition-all"
                                            value={selectedStaffExtra}
                                            onChange={(e) => setSelectedStaffExtra(e.target.value)}
                                        >
                                            {STAFF.map(s => (
                                                <option key={s.id} value={s.id}>{s.name} ({s.role})</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-amber-800 mb-1.5">คะแนน (จุดทศนิยม / ติดลบได้)</label>
                                        <input 
                                            type="number" 
                                            step="0.01"
                                            placeholder="เช่น 1.5, 5, -2"
                                            className="w-full border-amber-200 bg-white rounded-xl p-3 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none shadow-sm border transition-all placeholder:text-amber-300"
                                            value={extraPointInput}
                                            onChange={(e) => setExtraPointInput(e.target.value)}
                                        />
                                    </div>

                                    <button 
                                        onClick={handleAddExtraPoints}
                                        className="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-md shadow-amber-500/20 active:scale-[0.98]"
                                    >
                                        <StarIcon className="w-4 h-4" />
                                        บันทึกคะแนนเสริม
                                    </button>

                                    {notification === 'extra' && (
                                        <div className="p-3.5 bg-white/80 backdrop-blur border border-amber-200 text-amber-800 rounded-xl text-sm font-medium flex items-center gap-2">
                                            <CheckCircleIcon className="w-5 h-5 text-amber-500" /> อัปเดตคะแนนเสริมแล้ว!
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* เลนขวา: Dashboard สรุปผล (พื้นที่สำหรับสร้าง PDF) */}
                        <div className="lg:col-span-8 space-y-6" id="printable-area">
                            
                            {/* แสดงหัวข้อเฉพาะตอนจะปรินต์ PDF */}
                            <div className="hidden print:block mb-4">
                                <h1 className="text-2xl font-bold text-slate-800">รายงานคะแนนทีมโมดิฟายด์</h1>
                                <p className="text-slate-600">ประจำเดือน: {currentMonth}</p>
                            </div>

                            {/* Grid KPI Cards */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                {staffScores.map(staff => {
                                    const progress = Math.min(100, (staff.totalPoints / staff.kpi) * 100);
                                    const isWarning = progress < 30;
                                    const isGood = progress >= 100;
                                    const isAlmost = progress >= 80 && progress < 100;

                                    let statusColor = "bg-indigo-500";
                                    let statusBg = "bg-indigo-50";
                                    let statusText = "text-indigo-600";
                                    
                                    if (isGood) {
                                        statusColor = "bg-emerald-500"; statusBg = "bg-emerald-50"; statusText = "text-emerald-600";
                                    } else if (isAlmost) {
                                        statusColor = "bg-amber-500"; statusBg = "bg-amber-50"; statusText = "text-amber-600";
                                    } else if (isWarning) {
                                        statusColor = "bg-rose-500"; statusBg = "bg-rose-50"; statusText = "text-rose-600";
                                    }

                                    return (
                                        <div key={staff.id} className="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6 relative overflow-hidden transition-all hover:shadow-md group flex flex-col">
                                            <div className="flex justify-between items-start mb-5">
                                                <div className="flex items-center gap-3.5">
                                                    <div className={`p-2.5 rounded-xl ${statusBg} ${statusText} transition-colors`}>
                                                        <UserIcon className="w-6 h-6" />
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">{staff.name}</h3>
                                                        <p className="text-xs font-medium text-slate-500">{staff.role}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-3xl font-black text-slate-800 tracking-tight">
                                                        {staff.totalPoints.toFixed(2)}
                                                    </p>
                                                    <p className="text-xs font-semibold text-slate-400 mt-0.5">เป้าหมาย: {staff.kpi} pt</p>
                                                </div>
                                            </div>

                                            {/* Progress Bar Container */}
                                            <div className="mb-4">
                                                <div className="flex justify-between text-xs font-bold mb-1.5">
                                                    <span className={statusText}>{progress.toFixed(1)}%</span>
                                                    <span className="text-slate-400">100%</span>
                                                </div>
                                                <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden shadow-inner">
                                                    <div 
                                                        className={`h-full rounded-full transition-all duration-700 ease-out ${statusColor}`}
                                                        style={{ width: `${progress}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                            
                                            {/* Info Badges */}
                                            <div className="grid grid-cols-2 gap-2 mt-auto mb-3">
                                                <div className="bg-slate-50/80 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-center items-center text-center">
                                                    <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">ยังขาดอีก</span>
                                                    <span className="text-sm font-bold text-rose-500 flex items-center gap-1">
                                                        {staff.missingPoints > 0 ? staff.missingPoints.toFixed(2) : "ถึงเป้าแล้ว!"}
                                                    </span>
                                                </div>
                                                <div className="bg-slate-50/80 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-center items-center text-center">
                                                    <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">ต้องทำวันละ</span>
                                                    <span className="text-sm font-bold text-slate-700">
                                                        {staff.pointsPerDayNeeded > 0 ? staff.pointsPerDayNeeded.toFixed(2) : "-"} <span className="text-xs text-slate-400 font-medium">pt</span>
                                                    </span>
                                                </div>
                                            </div>

                                            {/* วันทำงานที่เหลือ (แก้ไขได้) */}
                                            <div className="flex justify-between items-center bg-indigo-50/40 border border-indigo-100/50 rounded-xl p-2 px-3 mt-1">
                                                <div className="flex flex-col">
                                                    <span className="text-xs font-semibold text-slate-600">วันทำงานที่เหลือ</span>
                                                    <span className="text-[10px] text-slate-400">คำนวณออโต้: {staff.autoDays} วัน</span>
                                                </div>
                                                <div className="flex items-center gap-1.5">
                                                    <input 
                                                        type="number"
                                                        min="0"
                                                        placeholder={staff.autoDays}
                                                        value={customDaysLeft[staff.id] !== undefined ? customDaysLeft[staff.id] : ''}
                                                        onChange={(e) => handleCustomDaysChange(staff.id, e.target.value)}
                                                        className="w-12 bg-white border border-slate-200 rounded-md py-1 text-center font-bold text-indigo-600 focus:ring-2 focus:ring-indigo-400 outline-none text-sm transition-all"
                                                        title="แก้ไขวันทำงานที่เหลือ (ลบข้อมูลทิ้งเพื่อกลับไปใช้ค่าออโต้)"
                                                    />
                                                    <span className="text-xs font-medium text-slate-500">วัน</span>
                                                </div>
                                            </div>

                                        </div>
                                    );
                                })}
                            </div>

                            {/* Data Table */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200/60 overflow-hidden flex flex-col">
                                <div className="px-6 py-5 border-b border-slate-100 bg-white flex justify-between items-center">
                                    <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                        <TrophyIcon className="w-5 h-5 text-indigo-500" />
                                        ตารางสรุปผลงาน
                                    </h2>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead className="text-xs text-slate-500 font-semibold bg-slate-50/80 border-b border-slate-200">
                                            <tr>
                                                <th className="px-6 py-4 rounded-tl-lg">รุ่นเครื่อง</th>
                                                <th className="px-6 py-4 text-center">คะแนน/เครื่อง</th>
                                                {STAFF.map(s => (
                                                    <th key={s.id} className="px-6 py-4 text-center">{s.name}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {MODELS.filter(m => 
                                                STAFF.some(s => (records[s.id]?.[m.id] || 0) > 0)
                                            ).map((model) => (
                                                <tr key={model.id} className="hover:bg-slate-50/60 transition-colors">
                                                    <td className="px-6 py-3.5 font-medium text-slate-700">
                                                        {model.name}
                                                    </td>
                                                    <td className="px-6 py-3.5 text-center text-slate-500">
                                                        {model.points}
                                                    </td>
                                                    {STAFF.map(staff => {
                                                        const count = records[staff.id]?.[model.id] || 0;
                                                        return (
                                                            <td key={staff.id} className="px-6 py-3.5 text-center">
                                                                {count > 0 ? (
                                                                    <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-50 text-indigo-700 font-bold text-sm">
                                                                        {count}
                                                                    </span>
                                                                ) : (
                                                                    <span className="text-slate-300">-</span>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                            
                                            {/* แถวคะแนนเสริม */}
                                            <tr className="bg-amber-50/30 hover:bg-amber-50/60 transition-colors">
                                                <td colSpan="2" className="px-6 py-4 font-semibold text-amber-800">
                                                    <div className="flex items-center gap-2">
                                                        <StarIcon className="w-4 h-4 text-amber-500" /> คะแนนงานเสริม
                                                    </div>
                                                </td>
                                                {STAFF.map(staff => (
                                                    <td key={staff.id} className="px-6 py-4 text-center font-bold text-amber-600">
                                                        {extraPoints[staff.id] !== 0 ? (extraPoints[staff.id] > 0 ? `+${extraPoints[staff.id]}` : extraPoints[staff.id]) : "-"}
                                                    </td>
                                                ))}
                                            </tr>

                                            {/* แถวสรุปรวมทั้งหมด */}
                                            <tr className="bg-slate-800 text-white">
                                                <td colSpan="2" className="px-6 py-5 font-bold text-base rounded-bl-lg">
                                                    คะแนนรวมสะสมสุทธิ
                                                </td>
                                                {staffScores.map(staff => (
                                                    <td key={staff.id} className="px-6 py-5 text-center font-black text-lg text-indigo-200">
                                                        {staff.totalPoints.toFixed(2)}
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        {/* จบพื้นที่สำหรับ PDF */}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- CSS เสริมสำหรับตอน Export PDF (ซ่อนปุ่มและจัดระยะ) -->
    <style>
        @media print {
            .hidden.print\:block { display: block !important; }
        }
    </style>
</body>
</html>
